services:
  claude:
    build: .
    stdin_open: true
    tty: true
    restart: unless-stopped
    user: "1001:1001"
    volumes:
      - claude-home:/home/claude
    environment:
      - SCHEDULER_CHANNEL_PORT=${SCHEDULER_CHANNEL_PORT:-8790}
      - SCHEDULER_API_PORT=${SCHEDULER_API_PORT:-8791}
    depends_on:
      - scheduler
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: false
    tmpfs:
      - /tmp:size=512m
    mem_limit: 4g
    cpus: 2
    pids_limit: 512

  scheduler:
    build: ./scheduler/api
    restart: unless-stopped
    volumes:
      - scheduler-data:/data
    environment:
      - SCHEDULER_API_PORT=${SCHEDULER_API_PORT:-8791}
      - SCHEDULER_CHANNEL_PORT=${SCHEDULER_CHANNEL_PORT:-8790}
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64

volumes:
  claude-home:
  scheduler-data:
