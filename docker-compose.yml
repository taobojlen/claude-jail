services:
  claude:
    build: .
    stdin_open: true
    tty: true
    restart: unless-stopped
    user: "1001:1001"
    volumes:
      - claude-home:/home/claude
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: false
    tmpfs:
      - /tmp:size=512m
    mem_limit: 4g
    cpus: 2
    pids_limit: 512

volumes:
  claude-home:
