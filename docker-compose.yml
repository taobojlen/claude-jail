services:
  claude:
    build: .
    stdin_open: true
    tty: true
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - claude-home:/home/ubuntu
      - ./dream:/opt/dream
      - ./entrypoint.sh:/opt/entrypoint.sh:ro
      - ./agent-CLAUDE.md:/home/ubuntu/.claude/CLAUDE.md:ro
      - ./settings.json:/home/ubuntu/.claude/settings.json:ro
      - ./hooks:/opt/hooks:ro
    environment:
      - SCHEDULER_CHANNEL_PORT=${SCHEDULER_CHANNEL_PORT:-8790}
      - SCHEDULER_API_PORT=${SCHEDULER_API_PORT:-8791}
      - MATRIX_CHANNEL_PORT=${MATRIX_CHANNEL_PORT:-8792}
      - MATRIX_API_PORT=${MATRIX_API_PORT:-8793}
    depends_on:
      - scheduler
      - matrix
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: false
    tmpfs:
      - /tmp:size=512m
    mem_limit: 4g
    cpus: 2
    pids_limit: 512

  scheduler:
    build: ./scheduler/api
    restart: unless-stopped
    volumes:
      - scheduler-data:/data
    environment:
      - SCHEDULER_API_PORT=${SCHEDULER_API_PORT:-8791}
      - SCHEDULER_CHANNEL_PORT=${SCHEDULER_CHANNEL_PORT:-8790}
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64

  matrix:
    build: ./matrix/api
    restart: unless-stopped
    volumes:
      - matrix-data:/data
    environment:
      - MATRIX_API_PORT=${MATRIX_API_PORT:-8793}
      - MATRIX_CHANNEL_PORT=${MATRIX_CHANNEL_PORT:-8792}
      - MATRIX_HOMESERVER_URL=${MATRIX_HOMESERVER_URL}
      - MATRIX_ACCESS_TOKEN=${MATRIX_ACCESS_TOKEN}
      - MATRIX_USER_ID=${MATRIX_USER_ID}
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64

volumes:
  claude-home:
  scheduler-data:
  matrix-data:
